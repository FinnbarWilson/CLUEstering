# to make global env
# run: mamba env create -f env.yml
# update: mamba env update -f env.yml --prune

name: CLUEstering
channels:
  - conda-forge
dependencies:
  # Core
  - python=3.13

  # Data
  - numpy
  - matplotlib
  - pandas
  - jupyter
  - pyarrow
  - fastparquet
  - optuna

  # C++ dependencies
  - boost
  - cmake
  - ninja
  - cxx-compiler

  # pip only downloads
  - pip
  - pip:
      - CLUEstering
